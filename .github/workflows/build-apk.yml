name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Restore or Download Gradle Wrapper Files
      run: |
        mkdir -p gradle/wrapper
        
        # 1. Restore gradle-wrapper.properties if missing
        if [ ! -f gradle/wrapper/gradle-wrapper.properties ]; then
          echo "gradle-wrapper.properties is missing! Recreating..."
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-9.3.1-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "networkTimeout=10000" >> gradle/wrapper/gradle-wrapper.properties
          echo "validateDistributionUrl=true" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        else
          echo "gradle-wrapper.properties is already present."
        fi

        # 2. Restore gradle-wrapper.jar if missing
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          echo "gradle-wrapper.jar is missing! Downloading official Gradle v9.3.1 wrapper JAR..."
          curl -Lo gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v9.3.1/gradle/wrapper/gradle-wrapper.jar
        else
          echo "gradle-wrapper.jar is already present."
        fi

        # 3. Restore gradlew launcher script if missing
        if [ ! -f gradlew ]; then
          echo "gradlew launcher script is missing! Downloading official Gradle v9.3.1 gradlew wrapper..."
          curl -Lo gradlew https://github.com/gradle/gradle/raw/v9.3.1/gradlew
        fi

    - name: Change wrapper permissions
      run: chmod +x gradlew

    - name: Ensure Environment Configuration Files Exist
      run: |
        if [ ! -f .env.example ]; then
          echo "Creating dummy .env.example..."
          echo "REMEDY_API_KEY=dummy_value" > .env.example
        fi
        if [ ! -f .env ]; then
          echo "Creating dummy .env..."
          echo "REMEDY_API_KEY=dummy_value" > .env
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
